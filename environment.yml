name: tf215
channels:
    - conda-forge
    - defaults
dependencies:
    - pandas
    - matplotlib
    - tensorflow-gpu
    - tensorboard
    - cudtoolkit
    - cudtoolkit-dev
    - numba
    - numpy
    - h5py
    - memory_profiler
    - pympler
    - scipy
    - lz4
    - pip
    - pip:
        - tensorboard-plugin-profile
        - bmtk


# Optional dependencies that may be useful
# Uncomment if needed
# tensorboard>=2.15.0

