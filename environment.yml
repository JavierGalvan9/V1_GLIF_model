name: tf215
channels:
    - conda-forge
    - kaeldai
    - defaults
dependencies:
    - pandas
    - matplotlib
    - tensorboard
    - numba
    - numpy=1.23.5
    - seaborn
    - h5py
    - joblib
    - memory_profiler
    - pympler
    - scipy
    - lz4
    - bmtk
    - pip
    - pip:
        - tensorflow[and-cuda]==2.15.0.post1
        - tensorboard-plugin-profile


# Optional dependencies that may be useful
# Uncomment if needed
# tensorboard>=2.15.0

# CUDA requirements
# The model is tested with CUDA 11.8 and cuDNN 8.8.0
# Make sure your system has compatible CUDA drivers installed